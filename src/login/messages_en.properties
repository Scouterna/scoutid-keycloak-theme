# IMPORTANT: Translation duplication required for Keycloakify v11
#
# This file defines translations for Keycloak deployment environment.
# The same translations MUST also be maintained in i18n.ts file
# for Storybook development to work.
#
# When adding/modifying translations:
# 1. Update this file for Keycloak deployment
# 2. Update i18n.ts for Storybook to work

# Override default Keycloak messages
loginAccountTitle=Sign in
usernameOrEmail=Username
username=Username

# Additional UI texts
usernameHelpText=Membership number, personal identity number, or primary email address

# Login page
scoutid.login.subheadline=Sign in with your ScoutID to continue.

# Help section
scoutid.help.title=Need help signing in?
scoutid.help.email.heading=Having trouble signing in with email?
scoutid.help.email.body=If multiple members share the same email address in Scoutnet — for example if both a child and their parent are members — signing in with email may fail. Use your membership number or personal identity number (Personnummer) instead.
scoutid.help.scoutid.heading=Do I have a ScoutID?
scoutid.help.scoutid.body=To sign in you need an account in the member system Scoutnet. Most scouts have one automatically, but if you are a member through Equmenia contact
scoutid.help.scoutid.after=for help.
